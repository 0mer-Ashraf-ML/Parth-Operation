version: 1.0

runtime: python311

build:
  commands:
    pre-build:
      - pip3 install --upgrade pip
    build:
      - pip3 install -r requirements.txt --no-cache-dir

run:
  runtime-version: "3.11.9"
  command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
  secrets:
    - name: DATABASE_URL
      value-from: "arn:aws:secretsmanager:us-east-1:541804384060:secret:prod/app/credentials-9LHYXc:DATABASE_URL"
    - name: JWT_SECRET
      value-from: "arn:aws:secretsmanager:us-east-1:541804384060:secret:prod/app/credentials-9LHYXc:JWT_SECRET"
